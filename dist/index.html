<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chronometer — Haleakala</title>
    <style>
        body {
            margin: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #1a1a2e;
            font-family: system-ui, sans-serif;
            color: #aaa;
        }
        canvas {
            border-radius: 50%;
            box-shadow: 0 0 40px rgba(0,0,0,0.5);
        }
        #location-panel {
            margin-top: 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 13px;
        }
        #location-panel label {
            color: #888;
        }
        #location-panel input {
            width: 80px;
            padding: 3px 6px;
            border: 1px solid #444;
            border-radius: 4px;
            background: #2a2a3e;
            color: #ddd;
            font-size: 13px;
            font-family: monospace;
        }
        #location-source {
            color: #666;
            font-style: italic;
        }
        #reset-location {
            color: #557;
            cursor: pointer;
            text-decoration: underline;
            font-size: 12px;
        }
        #reset-location:hover { color: #88a; }
    </style>
</head>
<body>
    <canvas id="watch" width="640" height="640"></canvas>
    <div id="location-panel">
        <label>Lat: <input id="lat-input" type="text"></label>
        <label>Lon: <input id="lon-input" type="text"></label>
        <span id="location-source"></span>
        <a id="reset-location" style="display:none">reset</a>
    </div>
    <script src="chronometer.js"></script>
</body>
</html>
