<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chronometer — Haleakalā</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; }

        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #1a1a2e;
            font-family: system-ui, sans-serif;
            color: #aaa;
        }

        /* Outer flex column: grid on top, controls at bottom */
        #app {
            display: flex;
            flex-direction: column;
            width: 100%;
            height: 100%;
        }

        /* The watch grid takes all remaining vertical space */
        #watch-grid {
            flex: 1 1 0;
            min-height: 0;
            display: grid;
            gap: 12px;
            padding: 12px;
            align-items: center;
            justify-items: center;
            align-content: center;
            justify-content: center;
        }

        /* Each face cell contains exactly one canvas */
        .face-cell {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .face-cell canvas {
            border-radius: 50%;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
            display: block;
        }

        /* Location controls strip at the bottom */
        #location-panel {
            flex: 0 0 auto;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 8px 16px;
            font-size: 13px;
            border-top: 1px solid #2a2a3e;
        }
        #location-panel label { color: #888; }
        #location-panel input {
            width: 80px;
            padding: 3px 6px;
            border: 1px solid #444;
            border-radius: 4px;
            background: #2a2a3e;
            color: #ddd;
            font-size: 13px;
            font-family: monospace;
        }
        #location-source { color: #666; font-style: italic; }
        #reset-location {
            color: #557;
            cursor: pointer;
            text-decoration: underline;
            font-size: 12px;
        }
        #reset-location:hover { color: #88a; }
        #back-link {
            position: absolute;
            top: 28px;
            left: 28px;
            color: #667;
            text-decoration: none;
            font-size: 28px;
            z-index: 10;
        }
        #back-link:hover { color: #99b; }
    </style>
</head>
<body>
    <div id="app">
        <a id="back-link" href="index.html">← Back</a>
        <div id="watch-grid"></div>
        <div id="location-panel">
            <label>Lat: <input id="lat-input" type="text"></label>
            <label>Lon: <input id="lon-input" type="text"></label>
            <span id="location-source"></span>
            <a id="reset-location" style="display:none">reset</a>
        </div>
    </div>
        <script src="chronometer-engine.js"></script>
    <script src="face-haleakala.js"></script>
</body>
</html>
