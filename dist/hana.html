<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="apple-touch-icon" href="thumb-hana.png">
    <title>Chronometer — Hana</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; }

        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #1a1a2e;
            font-family: system-ui, sans-serif;
            color: #aaa;
        }

        /* Outer flex column: grid on top, controls at bottom */
        #app {
            display: flex;
            flex-direction: column;
            width: 100%;
            height: 100%;
        }

        /* The watch grid takes all remaining vertical space */
        #watch-grid {
            flex: 1 1 0;
            min-height: 0;
            position: relative;
        }

        /* Each face cell contains exactly one canvas */
        .face-cell {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .face-cell canvas {
            border-radius: 50%;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
            display: block;
        }

        /* Location display strip at the bottom */
        #location-panel {
            flex: 0 0 auto;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin: 0 5px;
            padding: 8px 16px;
            font-size: 13px;
            border-top: 1px solid #2a2a3e;
        }
        #location-display { color: #888; }
        #location-source { color: #666; font-style: italic; }
        #set-location-btn {
            background: #2a2a3e;
            border: 1px solid #444;
            border-radius: 4px;
            color: #aac;
            font-size: 12px;
            padding: 2px 10px;
            cursor: pointer;
            transition: background 0.15s;
        }
        #set-location-btn:hover { background: #3a3a5e; color: #ddf; }

        /* Grid blur when location prompt is up */
        #watch-grid.blurred { filter: blur(8px); pointer-events: none; }

        /* Location prompt overlay */
        #location-prompt {
            position: fixed;
            inset: 0;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #location-prompt .lp-backdrop {
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.5);
        }
        #location-prompt .lp-dialog {
            position: relative;
            background: rgba(26, 26, 46, 0.98);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid #3a3a5e;
            border-radius: 14px;
            padding: 28px 32px;
            min-width: 300px;
            max-width: 400px;
            box-shadow: 0 8px 48px rgba(0,0,0,0.6);
            text-align: center;
        }
        #location-prompt .lp-title {
            font-size: 16px;
            color: #e0d8c8;
            margin: 0 0 6px;
            font-weight: 400;
        }
        #location-prompt .lp-subtitle {
            font-size: 13px;
            color: #776;
            margin: 0 0 20px;
        }
        #location-prompt .lp-inputs {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-bottom: 16px;
        }
        #location-prompt .lp-inputs label {
            color: #888;
            font-size: 13px;
        }
        #location-prompt .lp-inputs input {
            width: 90px;
            padding: 4px 6px;
            border: 1px solid #444;
            border-radius: 4px;
            background: #2a2a3e;
            color: #ddd;
            font-size: 13px;
            font-family: monospace;
        }
        #location-prompt .lp-buttons {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        #location-prompt .lp-btn {
            background: #2a2a4e;
            border: 1px solid #3a3a5e;
            border-radius: 6px;
            color: #aac;
            font-size: 13px;
            padding: 8px 16px;
            cursor: pointer;
            transition: background 0.15s;
        }
        #location-prompt .lp-btn:hover { background: #3a3a6e; color: #ddf; }
        #location-prompt .lp-btn.primary {
            background: #3a3a6e;
            border-color: #5566aa;
            color: #ddf;
        }
        #location-prompt .lp-btn.primary:hover { background: #4a4a8e; }
        #location-prompt .lp-btn:disabled {
            background: #2a2a3e !important;
            border-color: #333 !important;
            color: #556 !important;
            cursor: not-allowed;
        }
        #location-prompt .lp-btn:disabled:hover {
            background: #2a2a3e !important;
            color: #556 !important;
        }
        /* Instant tooltip on disabled buttons */
        #location-prompt .lp-btn[data-tooltip] { position: relative; }
        #location-prompt .lp-btn:disabled[data-tooltip]:hover::after {
            content: attr(data-tooltip);
            position: absolute;
            bottom: calc(100% + 2px);
            left: 50%;
            transform: translateX(-50%);
            background: #111122;
            border: 1px solid #3a3a5e;
            border-radius: 4px;
            padding: 5px 12px;
            font-size: 11px;
            color: #aa9;
            white-space: nowrap;
            pointer-events: none;
            z-index: 10;
        }
        #back-link {
            position: absolute;
            top: 28px;
            left: 28px;
            color: #667;
            text-decoration: none;
            font-size: 28px;
            z-index: 10;
        }
        #back-link:hover { color: #99b; }

        /* ============= Time Controller ============= */

        /* Time bar (always visible, between watch-grid and location-panel) */
        #time-bar {
            flex: 0 0 auto;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 5px 16px;
            font-size: 13px;
            border-top: 1px solid #2a2a3e;
            background: rgba(25, 25, 42, 0.9);
            color: #99b;
            font-family: monospace;
            user-select: none;
        }
        #time-bar-label {
            background: rgba(42, 42, 62, 0.85);
            border: 1px solid #3a3a5e;
            border-radius: 16px;
            color: #99b;
            font-size: 13px;
            padding: 4px 16px;
            cursor: pointer;
            transition: background 0.15s, color 0.15s;
        }
        #time-bar-label:hover { background: rgba(60, 60, 90, 0.95); color: #ccf; }
        #time-bar-label.active {
            background: #99b;
            color: #1a1a2e;
            border-color: #99b;
        }
        #time-bar-label.active:hover {
            background: #bbf;
            color: #1a1a2e;
        }
        #time-bar-info {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        #time-bar-date { color: #99b; }
        #time-bar.overridden #time-bar-date { color: #f66; font-weight: 600; }
        #time-bar-offset { color: #f99; font-size: 12px; display: none; }
        #time-bar.overridden #time-bar-offset { display: inline; }
        #time-bar-rate { color: #f88; font-weight: 600; cursor: pointer; display: none; }
        #time-bar.overridden #time-bar-rate { display: inline; }
        .time-bar-btn {
            background: #2a2a3e;
            border: 1px solid #444;
            border-radius: 4px;
            color: #aac;
            font-size: 12px;
            padding: 2px 10px;
            cursor: pointer;
            transition: background 0.15s;
            display: none;
        }
        #time-bar.overridden .time-bar-btn { display: inline-block; }
        .time-bar-btn:hover { background: #3a3a5e; color: #ddf; }

        /* Popover */
        #time-popover {
            position: absolute;
            bottom: 0;
            right: 0;
            z-index: 30;
            min-width: 200px;
            background: rgba(26, 26, 46, 0.96);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid #3a3a5e;
            border-radius: 14px 0 0 0;
            padding: 12px 14px;
            box-shadow: 0 -4px 32px rgba(0,0,0,0.5);
        }
        #tp-close {
            position: absolute;
            top: 4px;
            right: 4px;
            background: none;
            border: none;
            color: #667;
            font-size: 16px;
            cursor: pointer;
            padding: 2px 6px;
            line-height: 1;
            transition: color 0.15s;
        }
        #tp-close:hover { color: #ccf; }
        .tp-section {
            margin-bottom: 10px;
        }
        .tp-section:last-child { margin-bottom: 0; }
        .tp-label {
            font-size: 11px;
            text-transform: uppercase;
            color: #667;
            letter-spacing: 0.5px;
            margin-bottom: 5px;
        }
        .tp-btn-row {
            display: flex;
            gap: 4px;
            margin-bottom: 4px;
        }
        .tp-btn {
            background: #2a2a3e;
            border: 1px solid #3a3a5e;
            border-radius: 6px;
            color: #99b;
            font-size: 12px;
            padding: 5px 8px;
            cursor: pointer;
            transition: background 0.15s, color 0.15s, border-color 0.15s;
            white-space: nowrap;
            min-width: 32px;
            text-align: center;
            user-select: none;
            -webkit-user-select: none;
        }
        .tp-btn:hover { background: #3a3a5e; color: #ccf; }
        .tp-btn.active {
            background: #445;
            border-color: #8af;
            color: #8af;
        }
        /* Step buttons expand to fill row equally */
        .tp-step-row { display: flex; gap: 4px; margin-bottom: 4px; }
        .tp-step-row .tp-btn { flex: 1; font-size: 11px; padding: 5px 4px; }
        .tp-btn.holding {
            background: #556;
            border-color: #8af;
            color: #ccf;
        }
        /* Transport bar (play/pause) */
        .tp-transport { display: flex; gap: 4px; justify-content: center; }
        .tp-transport .tp-btn {
            font-size: 14px;
            padding: 5px 14px;
        }
        #tp-rate-label {
            font-size: 12px;
            color: #8af;
            text-align: center;
            margin-top: 4px;
        }
        .tp-date-inputs {
            display: flex;
            gap: 4px;
            margin-bottom: 4px;
        }
        .tp-date-inputs input {
            width: 52px;
            padding: 4px 5px;
            border: 1px solid #444;
            border-radius: 4px;
            background: #2a2a3e;
            color: #ddd;
            font-size: 13px;
            font-family: monospace;
            text-align: center;
        }
        .tp-date-inputs input:first-child { width: 58px; }  /* YYYY */
        #tp-apply {
            width: 100%;
            padding: 5px;
            background: #335;
            border: 1px solid #557;
            border-radius: 6px;
            color: #aac;
            font-size: 12px;
            cursor: pointer;
            transition: background 0.15s;
        }
        #tp-apply:hover { background: #446; color: #ddf; }
    </style>
</head>
<body>
    <div id="app">
        <a id="back-link" href="index.html">← Home</a>
        <div id="watch-grid"></div>
        <div id="time-bar">
            <button id="time-bar-label">⏱ Show time controller</button>
            <span id="time-bar-info">
                <span id="time-bar-date"></span>
                <span id="time-bar-offset"></span>
                <span id="time-bar-rate"></span>
            </span>
            <button class="time-bar-btn" id="time-bar-now">Now</button>
        </div>
        <div id="location-panel">
            <span id="location-display"></span>
            <span id="location-source"></span>
            <button id="set-location-btn">Set location</button>
        </div>

        <!-- Location prompt overlay (hidden by default) -->
        <div id="location-prompt" style="display:none">
            <div class="lp-backdrop"></div>
            <div class="lp-dialog">
                <h3 class="lp-title">Set Location</h3>
                <p class="lp-subtitle">Enter coordinates or use one of the options below</p>
                <div class="lp-inputs">
                    <label>Lat: <input id="lp-lat" type="text" placeholder="e.g. 37.335"></label>
                    <label>Lon: <input id="lp-lon" type="text" placeholder="e.g. -122.009"></label>
                </div>
                <div class="lp-buttons">
                    <button class="lp-btn primary" id="lp-use-coords">Use location above</button>
                    <button class="lp-btn" id="lp-use-browser">Use browser location</button>
                    <button class="lp-btn" id="lp-use-demo">Demo — Cupertino, CA</button>
                </div>
            </div>
        </div>

        <!-- Time controller popover -->
        <div id="time-popover" style="display:none">
            <button id="tp-close">&times;</button>
            <div class="tp-section">
                <div class="tp-transport" id="tp-transport"></div>
                <div id="tp-rate-label">1× (real time)</div>
            </div>
            <div class="tp-section">
                <div class="tp-label">Step (hold to scrub)</div>
                <div class="tp-step-row">
                    <button class="tp-btn" data-step="-year" data-unit="year">◀1y</button>
                    <button class="tp-btn" data-step="-month" data-unit="month">◀1mo</button>
                    <button class="tp-btn" data-step="-day" data-unit="day">◀1d</button>
                </div>
                <div class="tp-step-row">
                    <button class="tp-btn" data-step="-hour" data-unit="hour">◀1h</button>
                    <button class="tp-btn" data-step="-minute" data-unit="minute">◀1m</button>
                </div>
                <div class="tp-step-row">
                    <button class="tp-btn" data-step="+minute" data-unit="minute">1m ▶</button>
                    <button class="tp-btn" data-step="+hour" data-unit="hour">1h ▶</button>
                </div>
                <div class="tp-step-row">
                    <button class="tp-btn" data-step="+day" data-unit="day">1d ▶</button>
                    <button class="tp-btn" data-step="+month" data-unit="month">1mo ▶</button>
                    <button class="tp-btn" data-step="+year" data-unit="year">1y ▶</button>
                </div>
            </div>
            <div class="tp-section">
                <div class="tp-label">Set Date &amp; Time</div>
                <div class="tp-date-inputs">
                    <input id="tp-year" type="number" min="-4000" max="2800" placeholder="YYYY">
                    <input id="tp-month" type="number" min="1" max="12" placeholder="MM">
                    <input id="tp-day" type="number" min="1" max="31" placeholder="DD">
                </div>
                <div class="tp-date-inputs">
                    <input id="tp-hour" type="number" min="0" max="23" placeholder="HH">
                    <input id="tp-minute" type="number" min="0" max="59" placeholder="mm">
                    <button id="tp-apply">Apply</button>
                </div>
            </div>
        </div>

    </div>
        <script src="chronometer-engine.js"></script>
    <script src="face-hana.js"></script>
    <!-- Link preservation now handled by url-state.ts via initNavigationLinks() -->
</body>
</html>
