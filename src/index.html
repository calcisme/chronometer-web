<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emerald Chronometer</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; }

        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            min-height: 100%;
            background: #1a1a2e;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            color: #ccc;
        }

        header {
            text-align: center;
            padding: 48px 24px 16px;
        }

        header h1 {
            font-size: 28px;
            font-weight: 300;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: #e0d8c8;
            margin: 0 0 8px;
        }

        header p {
            font-size: 14px;
            color: #776;
            margin: 0;
            font-style: italic;
        }

        .face-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 24px;
            padding: 32px 48px 48px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .face-card {
            background: linear-gradient(145deg, #22223a 0%, #1a1a2e 100%);
            border: 1px solid #2a2a44;
            border-radius: 16px;
            padding: 28px 24px 24px;
            text-align: center;
            text-decoration: none;
            color: inherit;
            transition: transform 0.2s ease, border-color 0.3s ease, box-shadow 0.3s ease;
            display: block;
        }

        .face-card:hover {
            transform: translateY(-4px);
            border-color: #44447a;
            box-shadow: 0 12px 40px rgba(0,0,0,0.4);
        }

        .face-card .thumb {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            margin: 0 auto 20px;
            box-shadow: 0 0 24px rgba(0,0,0,0.5);
            object-fit: cover;
        }

        .face-card h2 {
            font-size: 20px;
            font-weight: 400;
            letter-spacing: 2px;
            color: #e0d8c8;
            margin: 0 0 8px;
        }

        .face-card .desc {
            font-size: 13px;
            color: #887;
            line-height: 1.5;
            margin: 0;
        }

        .all-link {
            text-align: center;
            padding: 16px 24px 48px;
        }

        .all-link a {
            display: inline-block;
            padding: 12px 32px;
            border: 1px solid #3a3a5e;
            border-radius: 8px;
            color: #aab;
            text-decoration: none;
            font-size: 14px;
            letter-spacing: 1px;
            transition: background 0.2s ease, border-color 0.2s ease;
        }

        .all-link a:hover {
            background: #2a2a44;
            border-color: #55558a;
        }
    </style>
</head>
<body>
    <header>
        <h1>Emerald Chronometer</h1>
        <p>Select a watch face</p>
    </header>

    <div class="face-grid">
        <a class="face-card" href="haleakala.html">
            <img class="thumb" src="thumb-haleakala.png" alt="Haleakalā">
            <h2>Haleakalā</h2>
            <p class="desc">Sunrise &amp; sunset times with alt/az</p>
        </a>

        <a class="face-card" href="hana.html">
            <img class="thumb" src="thumb-hana.png" alt="Hana">
            <h2>Hana</h2>
            <p class="desc">Moonrise &amp; sunset times, phase, and alt/az</p>
        </a>

        <a class="face-card" href="chandra.html">
            <img class="thumb" src="thumb-chandra.png" alt="Chandra">
            <h2>Chandra</h2>
            <p class="desc">Giant moonphase with alt/az dots</p>
        </a>

        <a class="face-card" href="selene.html">
            <img class="thumb" src="thumb-selene.png" alt="Selene">
            <h2>Selene</h2>
            <p class="desc">All about the moon</p>
        </a>
    </div>

    <div class="all-link">
        <a href="all.html">View All Faces</a>
    </div>
</body>
</html>
