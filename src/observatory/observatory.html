<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <meta name="description" content="Emerald Observatory — astronomical clock showing planetary positions, rise/set times, moon phase, day/night terminator, and more." />
    <title>Emerald Observatory</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap">
    <style>
      *,
      *::before,
      *::after {
          box-sizing: border-box;
      }

      html, body {
          margin: 0;
          padding: 0;
          width: 100%;
          height: 100%;
          overflow: hidden;
          background: #000000;
          font-family: 'Inter', system-ui, -apple-system, sans-serif;
          color: #d1d5db;
          -webkit-font-smoothing: antialiased;
          -moz-osx-font-smoothing: grayscale;
      }

      /* Full-viewport canvas */
      #observatory-canvas {
          display: block;
          width: 100%;
          height: 100%;
          position: fixed;
          top: 0;
          left: 0;
      }

      /* ── Bottom chrome: ONE row shared by the time-controller button (left)
         and the location controls (right). The canvas layout reserves exactly
         var(--obs-footer-h) at the bottom for this row (see FOOTER_H in
         observatory-entry.ts — keep the two in sync via the CSS variable,
         which the entry sets on :root at startup). ─────────────────────── */
      :root {
          --obs-footer-h: 32px;
      }

      /* Location controls — right end of the footer row */
      #observatory-controls {
          position: fixed;
          bottom: 0;
          right: 12px;
          height: var(--obs-footer-h);
          z-index: 11;
          display: flex;
          gap: 8px;
          align-items: center;
      }

      /* Minimal location name display */
      #location-name {
          font-size: 12px;
          color: rgba(255, 255, 255, 0.35);
          font-weight: 400;
          pointer-events: none;
      }

      #set-location-btn {
          background: rgba(255, 255, 255, 0.06);
          border: 1px solid rgba(255, 255, 255, 0.1);
          border-radius: 6px;
          color: rgba(255, 255, 255, 0.5);
          font-size: 11px;
          font-weight: 500;
          padding: 4px 10px;
          cursor: pointer;
          transition: background 0.2s, border-color 0.2s, color 0.2s;
          letter-spacing: 0.5px;
          text-transform: uppercase;
      }

      #set-location-btn:hover {
          background: rgba(255, 255, 255, 0.12);
          border-color: rgba(255, 255, 255, 0.2);
          color: rgba(255, 255, 255, 0.7);
      }

      /* ── Noon-on-top toggle — centered in the footer row. When it doesn't
         fit between the time-bar contents (left) and the location controls
         (right), the entry adds .wrapped to lift it onto a second row above
         the footer (and reserves the extra band in the canvas layout — see
         updateNoonToggleWrap in observatory-entry.ts). Pill appearance
         matches Chronometer's Vienna noon toggle (face-template.html). ── */
      #noon-toggle {
          position: fixed;
          bottom: 0;
          left: 50%;
          transform: translateX(-50%);
          height: var(--obs-footer-h);
          z-index: 11;
          display: flex;
          align-items: center;
          gap: 0;
          user-select: none;
          -webkit-user-select: none;
      }

      #noon-toggle.wrapped {
          bottom: var(--obs-footer-h);
      }

      .noon-pill {
          background: #2a2a3e;
          border: 1px solid #3a3a5e;
          color: #99b;
          font-family: inherit;
          font-size: 12px;
          padding: 5px 14px;
          cursor: pointer;
          transition: background 0.15s, color 0.15s, border-color 0.15s;
          white-space: nowrap;
      }

      .noon-pill:first-child {
          border-radius: 12px 0 0 12px;
          border-right: none;
      }

      .noon-pill:last-child {
          border-radius: 0 12px 12px 0;
      }

      .noon-pill:hover {
          background: #3a3a5e;
          color: #ccf;
      }

      .noon-pill.active {
          background: #445;
          border-color: #8af;
          color: #8af;
      }

      /* ── Location dialog injection ─────────────────── */
      {{LOCATION_CSS}}

      /* ── Time controller injection ──────────────────── */
      {{TIME_CSS}}

      /* Override time-bar styling for Observatory: it forms the LEFT part of
         the single bottom chrome row (location controls are the right part). */
      #time-bar {
          position: fixed;
          bottom: 0;
          left: 0;
          right: 0;
          height: var(--obs-footer-h);
          z-index: 10;
          padding: 0 12px;
          justify-content: flex-start;
          background: rgba(0, 0, 0, 0.5);
          border-top: 1px solid rgba(255, 255, 255, 0.08);
      }

      /* The ?fps overlay sits at the left end of the row — make room for it. */
      body.has-fps #time-bar {
          padding-left: 170px;
      }

      /* Observatory shows only the Show/Hide button, the red offset label,
         and the Now button (when time is overridden) in the time bar — NOT
         the running date/time or rate (the main dial already displays the
         time). The Now button follows the shared partial's behavior: hidden
         at 1× real time, shown when overridden.
         Deliberate (re-)removal of date/rate: this regressed once before when
         the shared partial's defaults leaked back in, so keep these !important. */
      #time-bar-date,
      #time-bar-rate {
          display: none !important;
      }

      #time-popover {
          position: fixed;
          bottom: calc(var(--obs-footer-h) + 6px);
          right: 12px;
          z-index: 20;
      }
    </style>
  </head>
  <body>
    <canvas id="observatory-canvas"></canvas>

    <!-- Minimal overlay controls -->
    <div id="observatory-controls">
      <span id="location-name">Detecting…</span>
      <button id="set-location-btn">Set Location</button>
    </div>

    <!-- Noon-on-top toggle (Vienna-style pills) -->
    <div id="noon-toggle">
      <button class="noon-pill" data-mode="midnight">Midnight on top</button>
      <button class="noon-pill" data-mode="noon">Noon on top</button>
    </div>

    {{LOCATION_DIALOG}}

    {{TIME_CONTROLLER}}

    <script src="observatory-engine.js"></script>
  </body>
</html>
