<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
    <title>Chronometer — Pick Faces</title>
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
        }

        html,
        body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #1a1a2e;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            color: #ccc;
            touch-action: manipulation;
        }

        /* Layout: header + scrollable grid + fixed summary strip */
        #pick-app {
            display: flex;
            flex-direction: column;
            width: 100%;
            height: 100%;
        }

        /* Header */
        .pick-header {
            flex: 0 0 auto;
            display: flex;
            align-items: center;
            padding: 12px 16px;
            gap: 12px;
        }

        .pick-header a {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: rgba(255,255,255,0.08);
            color: #889;
            text-decoration: none;
            transition: background 0.2s, color 0.2s;
        }

        .pick-header a:hover {
            background: rgba(255,255,255,0.15);
            color: #bbd;
        }

        .pick-header a svg {
            width: 18px;
            height: 18px;
            fill: currentColor;
        }

        .pick-header h1 {
            font-size: 20px;
            font-weight: 300;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #e0d8c8;
            margin: 0;
            flex: 1 1 auto;
        }

        .pick-header-actions {
            display: flex;
            gap: 8px;
            flex: 0 0 auto;
        }

        .pick-action-btn {
            padding: 6px 14px;
            border: 1px solid #3a3a5e;
            border-radius: 8px;
            background: rgba(255,255,255,0.06);
            color: #aab;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s, color 0.2s, border-color 0.2s;
            white-space: nowrap;
        }

        .pick-action-btn:hover {
            background: rgba(255,255,255,0.12);
            color: #dde;
            border-color: #5a5a7e;
        }

        .pick-action-btn.primary {
            background: #5ca0d3;
            border-color: #5ca0d3;
            color: #fff;
            font-weight: 600;
        }

        .pick-action-btn.primary:hover {
            background: #4a8fc2;
        }

        .pick-action-btn:disabled {
            opacity: 0.35;
            cursor: default;
        }

        /* Scrollable face grid */
        .pick-grid-wrapper {
            flex: 1 1 0;
            min-height: 0;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            padding: 12px 16px;
        }

        .pick-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 16px;
        }

        /* Each face card in the picker */
        .pick-card {
            width: 120px;
            cursor: pointer;
            text-align: center;
            position: relative;
            -webkit-tap-highlight-color: transparent;
        }

        .pick-card .pick-thumb {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid transparent;
            transition: border-color 0.2s, opacity 0.2s, transform 0.15s;
            margin: 0 auto 8px;
            display: block;
        }

        .pick-card.selected .pick-thumb {
            border-color: #5ca0d3;
        }

        .pick-card:not(.selected) .pick-thumb {
            opacity: 0.5;
        }

        .pick-card:active .pick-thumb {
            transform: scale(0.95);
        }

        .pick-card .pick-name {
            font-size: 13px;
            color: #aaa;
            font-weight: 400;
            margin: 0;
        }

        .pick-card.selected .pick-name {
            color: #ddd;
        }

        /* Selection badge */
        .pick-badge {
            position: absolute;
            top: -2px;
            right: 6px;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: #5ca0d3;
            color: #fff;
            font-size: 13px;
            font-weight: 600;
            display: none;
            align-items: center;
            justify-content: center;
            box-shadow: 0 2px 6px rgba(0,0,0,0.4);
        }

        .pick-card.selected .pick-badge {
            display: flex;
        }


        /* Bottom sheet */
        #sheet-backdrop {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 30;
        }

        #sheet-backdrop.visible {
            display: block;
        }

        #sheet-panel {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            max-height: 65vh;
            background: #22223a;
            border-bottom: 1px solid #3a3a5e;
            border-radius: 0 0 16px 16px;
            z-index: 31;
            transform: translateY(-100%);
            transition: transform 0.3s ease;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        #sheet-panel.visible {
            transform: translateY(0);
        }

        .sheet-header {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            border-bottom: 1px solid #2a2a44;
            flex: 0 0 auto;
        }

        .sheet-header h2 {
            flex: 1 1 auto;
            margin: 0;
            font-size: 16px;
            font-weight: 500;
            color: #e0d8c8;
        }

        .sheet-close {
            background: none;
            border: none;
            color: #667;
            font-size: 20px;
            cursor: pointer;
            padding: 2px 6px;
            line-height: 1;
            transition: color 0.15s;
        }

        .sheet-close:hover {
            color: #ccf;
        }

        .sheet-list {
            flex: 1 1 auto;
            min-height: 0;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            padding: 0;
        }

        .sheet-item {
            display: flex;
            align-items: center;
            padding: 10px 16px;
            gap: 12px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            user-select: none;
            transition: background 0.15s;
        }

        .sheet-item.dragging {
            background: rgba(92, 160, 211, 0.15);
            box-shadow: 0 2px 12px rgba(0,0,0,0.3);
            z-index: 32;
        }

        .sheet-item img {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            object-fit: cover;
            flex: 0 0 auto;
        }

        .sheet-item .sheet-name {
            flex: 1 1 auto;
            font-size: 15px;
            color: #ccc;
        }

        .sheet-item .sheet-remove {
            background: none;
            border: none;
            color: #664;
            font-size: 18px;
            cursor: pointer;
            padding: 4px 8px;
            line-height: 1;
            transition: color 0.15s;
            flex: 0 0 auto;
        }

        .sheet-item .sheet-remove:hover {
            color: #e55;
        }

        .sheet-item .sheet-handle {
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: grab;
            color: #556;
            font-size: 18px;
            padding: 4px 4px;
            touch-action: none;
            flex: 0 0 auto;
        }

        .sheet-item .sheet-handle:active {
            cursor: grabbing;
        }

        .sheet-done-footer {
            flex: 0 0 auto;
            padding: 12px 16px;
            border-top: 1px solid #2a2a44;
            text-align: center;
        }

        .sheet-done-btn {
            padding: 10px 32px;
            border: none;
            border-radius: 8px;
            background: #5ca0d3;
            color: #fff;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        .sheet-done-btn:hover {
            background: #4a8fc2;
        }

        /* Responsive: larger cards on wider screens */
        @media (min-width: 600px) {
            .pick-card {
                width: 150px;
            }

            .pick-card .pick-thumb {
                width: 120px;
                height: 120px;
            }

            .pick-card .pick-name {
                font-size: 14px;
            }
        }

        @media (min-width: 1024px) {
            .pick-card {
                width: 180px;
            }

            .pick-card .pick-thumb {
                width: 150px;
                height: 150px;
            }

            .pick-card .pick-name {
                font-size: 15px;
            }

            .pick-header h1 {
                font-size: 24px;
            }
        }
    </style>
</head>

<body>
    <div id="pick-app">
        <div class="pick-header">
            <a id="pick-home-link" href="index.html" title="Home">
                <svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
            </a>
            <h1>Pick Your Faces</h1>
            <div class="pick-header-actions">
                <button class="pick-action-btn" id="btn-all">All</button>
                <button class="pick-action-btn" id="btn-none">None</button>
                <button class="pick-action-btn" id="btn-reorder" disabled>Reorder</button>
                <button class="pick-action-btn primary" id="btn-done" disabled>Done</button>
            </div>
        </div>

        <div class="pick-grid-wrapper">
            <div class="pick-grid" id="pick-grid"></div>
        </div>
    </div>

    <!-- Bottom sheet for reordering -->
    <div id="sheet-backdrop"></div>
    <div id="sheet-panel">
        <div class="sheet-header">
            <h2>Reorder Faces</h2>
        </div>
        <div class="sheet-list" id="sheet-list"></div>
        <div class="sheet-done-footer">
            <button class="sheet-done-btn" id="sheet-done">Done</button>
        </div>
    </div>

    <script src="pick-page.js"></script>
</body>

</html>
