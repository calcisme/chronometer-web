<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="apple-touch-icon" href="{{ICON}}">
    <title>Chronometer — {{TITLE}}</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; }

        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #1a1a2e;
            font-family: system-ui, sans-serif;
            color: #aaa;
        }

        /* Outer flex column: grid on top, controls at bottom */
        #app {
            display: flex;
            flex-direction: column;
            width: 100%;
            height: 100%;
        }

        /* The watch grid takes all remaining vertical space */
        #watch-grid {
            flex: 1 1 0;
            min-height: 0;
            position: relative;
        }

        /* Each face cell contains exactly one canvas */
        .face-cell {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .face-cell canvas {
            border-radius: 50%;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
            display: block;
        }

        /* Location controls strip at the bottom */
        #location-panel {
            flex: 0 0 auto;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 8px 16px;
            font-size: 13px;
            border-top: 1px solid #2a2a3e;
        }
        #location-panel label { color: #888; }
        #location-panel input {
            width: 80px;
            padding: 3px 6px;
            border: 1px solid #444;
            border-radius: 4px;
            background: #2a2a3e;
            color: #ddd;
            font-size: 13px;
            font-family: monospace;
        }
        #location-source { color: #666; font-style: italic; }
        #reset-location {
            color: #557;
            cursor: pointer;
            text-decoration: underline;
            font-size: 12px;
        }
        #reset-location:hover { color: #88a; }
        #back-link {
            position: absolute;
            top: 28px;
            left: 28px;
            color: #667;
            text-decoration: none;
            font-size: 28px;
            z-index: 10;
        }
        #back-link:hover { color: #99b; }

        /* ============= Time Controller ============= */

        /* Time bar (always visible, between watch-grid and location-panel) */
        #time-bar {
            flex: 0 0 auto;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 5px 16px;
            font-size: 13px;
            border-top: 1px solid #2a2a3e;
            background: rgba(25, 25, 42, 0.9);
            color: #99b;
            font-family: monospace;
            user-select: none;
        }
        #time-bar-label {
            background: rgba(42, 42, 62, 0.85);
            border: 1px solid #3a3a5e;
            border-radius: 16px;
            color: #99b;
            font-size: 13px;
            padding: 4px 16px;
            cursor: pointer;
            transition: background 0.15s, color 0.15s;
        }
        #time-bar-label:hover { background: rgba(60, 60, 90, 0.95); color: #ccf; }
        #time-bar.overridden #time-bar-label { display: none; }
        #time-bar-date { color: #dde; display: none; }
        #time-bar.overridden #time-bar-date { display: inline; }
        #time-bar-rate { color: #8af; font-weight: 600; display: none; cursor: pointer; }
        #time-bar.overridden #time-bar-rate { display: inline; }
        .time-bar-btn {
            background: #2a2a3e;
            border: 1px solid #444;
            border-radius: 4px;
            color: #aac;
            font-size: 12px;
            padding: 2px 10px;
            cursor: pointer;
            transition: background 0.15s;
            display: none;
        }
        #time-bar.overridden .time-bar-btn { display: inline-block; }
        .time-bar-btn:hover { background: #3a3a5e; color: #ddf; }

        /* Popover */
        #time-popover {
            position: absolute;
            bottom: 80px;
            right: 16px;
            z-index: 30;
            min-width: 200px;
            background: rgba(26, 26, 46, 0.96);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid #3a3a5e;
            border-radius: 14px;
            padding: 12px 14px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
        }
        .tp-section {
            margin-bottom: 10px;
        }
        .tp-section:last-child { margin-bottom: 0; }
        .tp-label {
            font-size: 11px;
            text-transform: uppercase;
            color: #667;
            letter-spacing: 0.5px;
            margin-bottom: 5px;
        }
        .tp-btn-row {
            display: flex;
            gap: 4px;
            margin-bottom: 4px;
        }
        .tp-btn {
            background: #2a2a3e;
            border: 1px solid #3a3a5e;
            border-radius: 6px;
            color: #99b;
            font-size: 12px;
            padding: 5px 8px;
            cursor: pointer;
            transition: background 0.15s, color 0.15s, border-color 0.15s;
            white-space: nowrap;
            min-width: 32px;
            text-align: center;
            user-select: none;
            -webkit-user-select: none;
        }
        .tp-btn:hover { background: #3a3a5e; color: #ccf; }
        .tp-btn.active {
            background: #445;
            border-color: #8af;
            color: #8af;
        }
        /* Step buttons expand to fill row equally */
        .tp-step-row { display: flex; gap: 4px; margin-bottom: 4px; }
        .tp-step-row .tp-btn { flex: 1; }
        .tp-btn.holding {
            background: #556;
            border-color: #8af;
            color: #ccf;
        }
        /* Play/pause toggle */
        #tp-playpause {
            font-size: 14px;
            padding: 5px 14px;
        }
        #tp-rate-label {
            font-size: 12px;
            color: #8af;
            text-align: center;
            margin-top: 4px;
        }
        .tp-date-inputs {
            display: flex;
            gap: 4px;
            margin-bottom: 4px;
        }
        .tp-date-inputs input {
            width: 52px;
            padding: 4px 5px;
            border: 1px solid #444;
            border-radius: 4px;
            background: #2a2a3e;
            color: #ddd;
            font-size: 13px;
            font-family: monospace;
            text-align: center;
        }
        .tp-date-inputs input:first-child { width: 58px; }  /* YYYY */
        #tp-apply {
            width: 100%;
            padding: 5px;
            background: #335;
            border: 1px solid #557;
            border-radius: 6px;
            color: #aac;
            font-size: 12px;
            cursor: pointer;
            transition: background 0.15s;
        }
        #tp-apply:hover { background: #446; color: #ddf; }
    </style>
</head>
<body>
    <div id="app">
        <a id="back-link" href="index.html">← Home</a>
        <div id="watch-grid"></div>
        <div id="time-bar">
            <button id="time-bar-label">⏱ Time control</button>
            <span id="time-bar-date"></span>
            <span id="time-bar-rate"></span>
            <button class="time-bar-btn" id="time-bar-now">Now</button>
        </div>
        <div id="location-panel">
            <label>Lat: <input id="lat-input" type="text"></label>
            <label>Lon: <input id="lon-input" type="text"></label>
            <span id="location-source"></span>
            <a id="reset-location" style="display:none">reset</a>
        </div>

        <!-- Time controller popover -->
        <div id="time-popover" style="display:none">
            <div class="tp-section">
                <div class="tp-btn-row">
                    <button class="tp-btn active" id="tp-playpause">▶</button>
                </div>
                <div id="tp-rate-label">1× (real time)</div>
            </div>
            <div class="tp-section">
                <div class="tp-label">Step (hold to scrub)</div>
                <div class="tp-step-row">
                    <button class="tp-btn" data-step="-hour" data-unit="hour">◀ 1h</button>
                    <button class="tp-btn" data-step="-day" data-unit="day">◀ 1d</button>
                    <button class="tp-btn" data-step="-month" data-unit="month">◀ 1mo</button>
                </div>
                <div class="tp-step-row">
                    <button class="tp-btn" data-step="+hour" data-unit="hour">1h ▶</button>
                    <button class="tp-btn" data-step="+day" data-unit="day">1d ▶</button>
                    <button class="tp-btn" data-step="+month" data-unit="month">1mo ▶</button>
                </div>
            </div>
            <div class="tp-section">
                <div class="tp-label">Set Date &amp; Time</div>
                <div class="tp-date-inputs">
                    <input id="tp-year" type="number" min="-4000" max="2800" placeholder="YYYY">
                    <input id="tp-month" type="number" min="1" max="12" placeholder="MM">
                    <input id="tp-day" type="number" min="1" max="31" placeholder="DD">
                </div>
                <div class="tp-date-inputs">
                    <input id="tp-hour" type="number" min="0" max="23" placeholder="HH">
                    <input id="tp-minute" type="number" min="0" max="59" placeholder="mm">
                    <button id="tp-apply">Apply</button>
                </div>
            </div>
        </div>

    </div>
    {{SCRIPTS}}
    <script>
        // Pass along query parameters (like ?lat=...&lon=...) when going back home
        if (window.location.search) {
            const backLink = document.getElementById('back-link');
            if (backLink) {
                const url = new URL(backLink.href, window.location.href);
                url.search = window.location.search;
                backLink.href = url.toString();
            }
        }
    </script>
</body>
</html>
