<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Privacy — Emerald Chronometer</title>
    <meta
      name="description"
      content="Privacy policy for Emerald Chronometer for the Web, a client-side astronomical watch-face app."
    />
    <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png" />
    <link rel="icon" type="image/png" href="apple-touch-icon.png" />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        min-height: 100%;
        background: #1a1a2e;
        font-family:
          "Segoe UI",
          system-ui,
          -apple-system,
          sans-serif;
        color: #ccc;
      }

      main {
        max-width: 640px;
        margin: 0 auto;
        padding: 48px 24px 64px;
        line-height: 1.7;
      }

      h1 {
        font-size: 24px;
        font-weight: 300;
        letter-spacing: 3px;
        text-transform: uppercase;
        color: #e0d8c8;
        margin: 0 0 8px;
      }

      .subtitle {
        font-size: 13px;
        color: #776;
        font-style: italic;
        margin: 0 0 32px;
      }

      h2 {
        font-size: 16px;
        font-weight: 600;
        color: #dde;
        margin: 28px 0 10px;
        letter-spacing: 0.3px;
      }

      p,
      li {
        font-size: 14px;
        color: #bbc;
        margin: 8px 0;
      }

      ul {
        padding-left: 20px;
        margin: 8px 0;
      }

      li {
        margin: 6px 0;
      }

      a {
        color: #8af;
        text-decoration: none;
      }

      a:hover {
        text-decoration: underline;
      }

      hr {
        border: none;
        border-top: 1px solid #2a2a44;
        margin: 28px 0;
      }

      .last-updated {
        font-size: 12px;
        color: #556;
        margin-top: 32px;
      }
    </style>
  </head>

  <body>
    <main>{{PRIVACY_CONTENT}}</main>
  </body>
</html>
